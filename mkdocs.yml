site_name: S.D.T. (Software Digital Thread)
site_description: Repo birth, baseline, continuity, and proof surfaces.
site_url: https://novakprotocol.github.io/novak-sdt/
repo_url: https://github.com/novakprotocol/novak-sdt
repo_name: novakprotocol/novak-sdt

theme:
  name: material
  features:
    - navigation.sections
    - navigation.tabs

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

nav:
  - Home: index.md
  - Proofs: PROOFS.md
  - Reports: REPORTS.md
  - Serious Mode: SDT_SERIOUS_MODE.md
  - Current Repo Report (Markdown): status/SDT_REPO_REPORT.md
  - GitHub Pages: GITHUB_PAGES.md
  - Case Study: CASE_STUDY.md
  - SDT 101: SDT_101.md
  - Before / After Example: EXAMPLE_BASELINE_BEFORE_AFTER.md
  - Created Docs Index: SDT_CREATED_DOCS_INDEX.md
  - Diagrams:
      - Operational Flow: DIAGRAM_01_OPERATIONAL_FLOW.md
      - Files Added: DIAGRAM_02_FILES_ADDED.md
      - Freshman Explanation: DIAGRAM_03_FRESHMAN_EXPLANATION.md
  - Operations:
      - Public vs Protected: PUBLIC_VS_PRIVATE.md
  - History:
      - SDT History Lane: SDT_HISTORY_LANE.md
      - History Index: history/HISTORY_INDEX.md
      - Failure Patterns: history/FAILURE_PATTERNS.md
      - Missed Opportunities: history/MISSED_OPPORTUNITIES.md
