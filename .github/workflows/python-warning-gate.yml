name: python-warning-gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  warning-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: bash tools/check_python_warnings.sh
